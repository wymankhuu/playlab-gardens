<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Share Your App — Playlab Gardens</title>
  <meta name="description" content="Built something on Playlab? Share it with the Community Gardens so other educators can discover your work.">
  <meta property="og:title" content="Share Your App — Playlab Gardens">
  <meta property="og:description" content="Built something on Playlab? Share it with the Community Gardens so other educators can discover your work.">
  <meta property="og:image" content="https://playlabgardens.com/images/beat-2.webp">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Share Your App — Playlab Gardens">
  <meta name="twitter:description" content="Built something on Playlab? Share it with the Community Gardens.">
  <meta name="twitter:image" content="https://playlabgardens.com/images/beat-2.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="images/favicon.webp" type="image/webp">
</head>
<body>
  <div id="layout-nav"></div>

  <!-- Hero -->
  <section class="share-hero">
    <div class="container">
      <a href="/" class="collection-breadcrumb" style="margin-bottom: 16px; display: inline-flex;">
        ← Back to Gardens
      </a>
      <h1 class="share-hero-title">Share Your App</h1>
      <p class="share-hero-desc">Built something on Playlab? Tell us about it. We review every submission and add apps to the Gardens so other educators can discover and learn from your work.</p>
    </div>
  </section>

  <!-- Form -->
  <main class="container section">
    <div id="form-container" class="share-form-container">
      <form id="share-form" class="share-form" novalidate>
        <div class="form-group">
          <label for="app-name" class="form-label">App Name <span class="form-required">*</span></label>
          <input type="text" id="app-name" class="form-input" placeholder="What's your app called?" required>
        </div>

        <div class="form-group">
          <label for="app-url" class="form-label">Playlab URL <span class="form-required">*</span></label>
          <input type="url" id="app-url" class="form-input" placeholder="https://playlab.ai/project/..." required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="creator" class="form-label">Your Name <span class="form-required">*</span></label>
            <input type="text" id="creator" class="form-input" placeholder="First and last name" required>
          </div>
          <div class="form-group">
            <label for="role" class="form-label">Your Role <span class="form-required">*</span></label>
            <input type="text" id="role" class="form-input" placeholder="e.g. Teacher, Student, Coach" required>
          </div>
        </div>

        <div class="form-group">
          <label for="description" class="form-label">Description <span class="form-required">*</span></label>
          <textarea id="description" class="form-textarea" rows="3" placeholder="What does your app do? (1-2 sentences)" required></textarea>
        </div>

        <div class="form-group">
          <label for="usage" class="form-label">How It's Being Used <span class="form-required">*</span></label>
          <textarea id="usage" class="form-textarea" rows="3" placeholder="How are students or educators using this app? What does a typical session look like?" required></textarea>
        </div>

        <div class="form-group">
          <label for="impact" class="form-label">Impact <span class="form-required">*</span></label>
          <textarea id="impact" class="form-textarea" rows="3" placeholder="What difference has this app made? Any outcomes, stories, or numbers you can share?" required></textarea>
        </div>

        <div class="form-group form-checkbox-group">
          <label class="form-checkbox-label">
            <input type="checkbox" id="public-consent">
            <span>I'm willing to have my app shared publicly in the Playlab Gardens</span>
          </label>
        </div>

        <button type="submit" id="submit-btn" class="share-submit-btn">Submit Your App</button>
      </form>
    </div>

  </main>

  <div id="layout-footer"></div>
  <div id="layout-scroll-top"></div>

  <script defer src="js/layout.js"></script>
  <script defer src="js/shared.js"></script>
  <script defer src="js/share.js"></script>
</body>
</html>
